    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <body>

        <div class="container">

            <h1>Bus Ticket Reservation</h1>

            <div class="booking-form-card">
                <h2>Book Your Seat</h2>
    <!--Booking Form UI where users can input their details -->
                <form>
                    <input type="text" placeholder="Full Name">

                    <input type="text" placeholder="From">

                    <input type="text" placeholder="To">

                    <input type="date">

                    <button type="submit">Reserve Now</button>
                </form>
            </div>
        </div>
<div class="container">    
<div class="seat-section-card">
    <h2 id="seat-selection">Select Seat</h2>

    <div class="bus-layout">
        <div class="seat">A1</div>
        <div class="seat">A2</div>
        <div class="aisle"></div>
        <div class="seat">B1</div>
        <div class="seat">B2</div>

        <div class="seat">C1</div>
        <div class="seat">C2</div>
        <div class="aisle"></div>
        <div class="seat">D1</div>
        <div class="seat">D2</div>

        <div class="seat">E1</div>
        <div class="seat">E2</div>
        <div class="aisle"></div>
        <div class="seat">F1</div>
        <div class="seat">F2</div>

        <div class="seat">G1</div>
        <div class="seat">G2</div>
        <div class="aisle"></div>
        <div class="seat">H1</div>
        <div class="seat">H2</div>

        <div class="seat">I1</div>
        <div class="seat">I2</div>
        <div class="aisle"></div>
        <div class="seat">J1</div>
        <div class="seat">J2</div>
    </div>
</div>  
</div>
            
<div class="container">
        <!--Ticket Preview UI-->
            <div class="ticket-card">
                <h2>Ticket Preview</h2>

                <p><strong>Name:</strong> Juan Dela Cruz</p>
                <p><strong>Route:</strong> Manila → Nueva Ecija</p>
                <p><strong>Seat:</strong> A1</p>
                <p><strong>Date:</strong> June 25, 2026</p>
            </div>

</div>        

    </body>
    </html>
